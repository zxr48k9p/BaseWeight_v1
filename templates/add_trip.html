<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ 'Edit' if trip else 'Plan a' }} Trip</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --bs-primary: #6b8e23;
            --bs-body-bg: #0f0f0f;
            --bs-body-color: #e0e0e0;
        }
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.8)), 
                        url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
        }
        .card {
            background-color: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-7">
            <div class="card shadow-sm">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h3 class="mb-0"><i class="bi bi-map-fill"></i> {{ 'Edit' if trip else 'Plan a New' }} Trip</h3>
                    <a href="{{ url_for('trips') }}" class="btn btn-outline-light btn-sm">Back to Trips</a>
                </div>
                <div class="card-body p-4">
                    <form action="{{ url_for('edit_trip', trip_id=trip.id) if trip else url_for('add_trip') }}" method="POST" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label class="form-label">Trip Name</label>
                            <input type="text" name="name" class="form-control" value="{{ trip.name if trip else '' }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Date</label>
                            <input type="date" name="date" class="form-control" value="{{ trip.date.strftime('%Y-%m-%d') if trip and trip.date else '' }}">
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Distance (km)</label>
                                <input type="number" step="0.1" name="distance" class="form-control" value="{{ trip.distance if trip else '' }}" placeholder="e.g., 15.5">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Elevation Gain (m)</label>
                                <input type="number" step="1" name="elevation_gain" class="form-control" value="{{ trip.elevation_gain|int if trip and trip.elevation_gain else '' }}" placeholder="e.g., 500">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Steps</label>
                            <input type="number" name="steps" class="form-control" value="{{ trip.steps if trip else '' }}" placeholder="e.g., 20000">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Notes</label>
                            <textarea name="notes" class="form-control" rows="4" placeholder="Details about the route, conditions, etc.">{{ trip.notes if trip else '' }}</textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Assign Kit</label>
                            <select name="kit_id" class="form-select">
                                <option value="0">-- No Kit Assigned --</option>
                                {% for kit in kits %}
                                <option value="{{ kit.id }}" {% if trip and trip.kit_id == kit.id %}selected{% endif %}>{{ kit.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Cover Image</label>
                            {% if trip and trip.image_filename %}
                            <p class="small text-muted">Current: {{ trip.image_filename }}. Upload a new file to replace it.</p>
                            {% endif %}
                            <input type="file" name="image" class="form-control" accept="image/*">
                        </div>
                        <div class="mb-4">
                            <label class="form-label">GPX File</label>
                            {% if trip and trip.gpx_filename %}
                            <p class="small text-muted">Current: {{ trip.gpx_filename }}. Upload a new file to replace it.</p>
                            {% endif %}
                            <input type="file" name="gpx_file" class="form-control" accept=".gpx">
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">{{ 'Save Changes' if trip else 'Add Trip' }}</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
